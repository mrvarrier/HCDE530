<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCDE 530 - Week 2: Word Count Analysis Dashboard</title>

    <!-- Chart.js library for creating interactive charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <style>
        /* ====================================================================
           CSS STYLING - Makes the dashboard look clean and professional
           ==================================================================== */

        /* Reset and base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header section */
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        /* Statistics cards at the top */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            color: #667eea;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
        }

        /* Main content area with two columns */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        /* Chart containers */
        .chart-container {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .chart-container h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        /* Data table section */
        .table-section {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            grid-column: 1 / -1; /* Span full width */
        }

        .table-section h2 {
            color: #333;
            margin-bottom: 15px;
        }

        /* Controls for filtering and searching */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .controls input,
        .controls select {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 1em;
            flex: 1;
            min-width: 200px;
        }

        .controls input:focus,
        .controls select:focus {
            outline: none;
            border-color: #667eea;
        }

        /* Data table styles */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #667eea;
            color: white;
        }

        th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            position: relative;
        }

        /* Sort indicator arrows */
        th:hover {
            background: #5568d3;
        }

        th.sortable::after {
            content: ' ↕';
            opacity: 0.5;
        }

        th.sort-asc::after {
            content: ' ↑';
            opacity: 1;
        }

        th.sort-desc::after {
            content: ' ↓';
            opacity: 1;
        }

        tbody tr {
            border-bottom: 1px solid #e0e0e0;
            transition: background-color 0.2s;
        }

        tbody tr:hover {
            background-color: #f5f5f5;
        }

        td {
            padding: 12px;
        }

        /* Word count badges with color coding */
        .word-count-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
        }

        .word-count-low {
            background: #fee;
            color: #c33;
        }

        .word-count-medium {
            background: #ffeaa7;
            color: #d63031;
        }

        .word-count-high {
            background: #dfe6e9;
            color: #2d3436;
        }

        /* Responsive design for mobile */
        @media (max-width: 768px) {
            .content-grid {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
            }

            .controls input,
            .controls select {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>📊 Word Count Analysis Dashboard</h1>
            <p>HCDE 530 - Week 2: Interactive Data Visualization</p>
        </header>

        <!-- Summary Statistics Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Responses</h3>
                <div class="value" id="totalResponses">-</div>
            </div>
            <div class="stat-card">
                <h3>Average Words</h3>
                <div class="value" id="avgWords">-</div>
            </div>
            <div class="stat-card">
                <h3>Shortest Response</h3>
                <div class="value" id="minWords">-</div>
            </div>
            <div class="stat-card">
                <h3>Longest Response</h3>
                <div class="value" id="maxWords">-</div>
            </div>
        </div>

        <!-- Charts Section -->
        <div class="content-grid">
            <div class="chart-container">
                <h2>Word Count Distribution</h2>
                <canvas id="distributionChart"></canvas>
            </div>
            <div class="chart-container">
                <h2>Responses by Role</h2>
                <canvas id="roleChart"></canvas>
            </div>
        </div>

        <!-- Interactive Data Table -->
        <div class="table-section">
            <h2>Detailed Response Data</h2>

            <!-- Search and filter controls -->
            <div class="controls">
                <input type="text" id="searchInput" placeholder="🔍 Search responses...">
                <select id="roleFilter">
                    <option value="">All Roles</option>
                </select>
            </div>

            <!-- Data table -->
            <table id="dataTable">
                <thead>
                    <tr>
                        <th class="sortable" data-column="participant_id">ID</th>
                        <th class="sortable" data-column="role">Role</th>
                        <th class="sortable" data-column="word_count">Word Count</th>
                        <th data-column="response">Response</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Populated by JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        /* ====================================================================
           JAVASCRIPT CODE - Makes the dashboard interactive
           ==================================================================== */

        // Global variable to store our data
        let responseData = [];
        let currentSort = { column: null, ascending: true };

        /**
         * Load and parse the CSV file
         * This function reads the demo_responses.csv file and converts it to JSON
         */
        async function loadCSVData() {
            try {
                // Fetch the CSV file
                const response = await fetch('demo_responses.csv');
                const csvText = await response.text();

                // Parse CSV text into array of objects
                const lines = csvText.trim().split('\n');
                const headers = lines[0].split(',');

                // Convert each line to an object with word count
                responseData = lines.slice(1).map(line => {
                    const values = parseCSVLine(line);
                    const obj = {};
                    headers.forEach((header, index) => {
                        obj[header.trim()] = values[index];
                    });
                    // Calculate word count for each response
                    obj.word_count = countWords(obj.response);
                    return obj;
                });

                // Initialize the dashboard with data
                initializeDashboard();
            } catch (error) {
                console.error('Error loading CSV:', error);
                alert('Error loading data. Make sure demo_responses.csv is in the same directory!');
            }
        }

        /**
         * Parse a CSV line, handling commas within quoted fields
         * This is needed because responses might contain commas
         */
        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;

            for (let i = 0; i < line.length; i++) {
                const char = line[i];

                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());

            return result;
        }

        /**
         * Count words in a text string
         * Same logic as the Python script - split on whitespace and count
         */
        function countWords(text) {
            return text.trim().split(/\s+/).length;
        }

        /**
         * Initialize all dashboard components
         */
        function initializeDashboard() {
            updateStatistics();
            createCharts();
            populateRoleFilter();
            renderTable(responseData);
            setupEventListeners();
        }

        /**
         * Calculate and display summary statistics
         */
        function updateStatistics() {
            const wordCounts = responseData.map(d => d.word_count);

            document.getElementById('totalResponses').textContent = responseData.length;
            document.getElementById('avgWords').textContent =
                (wordCounts.reduce((a, b) => a + b, 0) / wordCounts.length).toFixed(1);
            document.getElementById('minWords').textContent = Math.min(...wordCounts);
            document.getElementById('maxWords').textContent = Math.max(...wordCounts);
        }

        /**
         * Create interactive charts using Chart.js
         */
        function createCharts() {
            createDistributionChart();
            createRoleChart();
        }

        /**
         * Create word count distribution histogram
         */
        function createDistributionChart() {
            const ctx = document.getElementById('distributionChart').getContext('2d');

            // Group word counts into bins
            const wordCounts = responseData.map(d => d.word_count);
            const bins = [0, 28, 32, 36, 45];
            const binLabels = ['26-28', '29-32', '33-36', '37+'];
            const binCounts = [0, 0, 0, 0];

            wordCounts.forEach(count => {
                if (count <= 28) binCounts[0]++;
                else if (count <= 32) binCounts[1]++;
                else if (count <= 36) binCounts[2]++;
                else binCounts[3]++;
            });

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: binLabels,
                    datasets: [{
                        label: 'Number of Responses',
                        data: binCounts,
                        backgroundColor: [
                            'rgba(255, 99, 132, 0.7)',
                            'rgba(255, 206, 86, 0.7)',
                            'rgba(75, 192, 192, 0.7)',
                            'rgba(153, 102, 255, 0.7)'
                        ],
                        borderColor: [
                            'rgba(255, 99, 132, 1)',
                            'rgba(255, 206, 86, 1)',
                            'rgba(75, 192, 192, 1)',
                            'rgba(153, 102, 255, 1)'
                        ],
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { stepSize: 1 }
                        }
                    }
                }
            });
        }

        /**
         * Create pie chart showing distribution by role
         */
        function createRoleChart() {
            const ctx = document.getElementById('roleChart').getContext('2d');

            // Count responses by role
            const roleCounts = {};
            responseData.forEach(d => {
                roleCounts[d.role] = (roleCounts[d.role] || 0) + 1;
            });

            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(roleCounts),
                    datasets: [{
                        data: Object.values(roleCounts),
                        backgroundColor: [
                            'rgba(255, 99, 132, 0.7)',
                            'rgba(54, 162, 235, 0.7)',
                            'rgba(255, 206, 86, 0.7)',
                            'rgba(75, 192, 192, 0.7)'
                        ],
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
        }

        /**
         * Populate the role filter dropdown
         */
        function populateRoleFilter() {
            const roles = [...new Set(responseData.map(d => d.role))].sort();
            const select = document.getElementById('roleFilter');

            roles.forEach(role => {
                const option = document.createElement('option');
                option.value = role;
                option.textContent = role;
                select.appendChild(option);
            });
        }

        /**
         * Render the data table
         */
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            data.forEach(row => {
                const tr = document.createElement('tr');

                // Determine badge color based on word count
                let badgeClass = 'word-count-medium';
                if (row.word_count <= 28) badgeClass = 'word-count-low';
                else if (row.word_count >= 37) badgeClass = 'word-count-high';

                tr.innerHTML = `
                    <td>${row.participant_id}</td>
                    <td>${row.role}</td>
                    <td><span class="word-count-badge ${badgeClass}">${row.word_count}</span></td>
                    <td>${row.response}</td>
                `;

                tbody.appendChild(tr);
            });
        }

        /**
         * Setup event listeners for interactivity
         */
        function setupEventListeners() {
            // Search functionality
            document.getElementById('searchInput').addEventListener('input', filterTable);

            // Role filter
            document.getElementById('roleFilter').addEventListener('change', filterTable);

            // Sortable columns
            document.querySelectorAll('th.sortable').forEach(th => {
                th.addEventListener('click', () => sortTable(th.dataset.column));
            });
        }

        /**
         * Filter table based on search and role filter
         */
        function filterTable() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const roleFilter = document.getElementById('roleFilter').value;

            let filtered = responseData;

            // Filter by role if selected
            if (roleFilter) {
                filtered = filtered.filter(d => d.role === roleFilter);
            }

            // Filter by search term
            if (searchTerm) {
                filtered = filtered.filter(d =>
                    d.participant_id.toLowerCase().includes(searchTerm) ||
                    d.role.toLowerCase().includes(searchTerm) ||
                    d.response.toLowerCase().includes(searchTerm)
                );
            }

            renderTable(filtered);
        }

        /**
         * Sort table by column
         */
        function sortTable(column) {
            // Toggle sort direction if clicking same column
            if (currentSort.column === column) {
                currentSort.ascending = !currentSort.ascending;
            } else {
                currentSort.column = column;
                currentSort.ascending = true;
            }

            // Sort the data
            const sorted = [...responseData].sort((a, b) => {
                let aVal = a[column];
                let bVal = b[column];

                // Convert to numbers if sorting by word_count
                if (column === 'word_count') {
                    aVal = parseInt(aVal);
                    bVal = parseInt(bVal);
                }

                if (aVal < bVal) return currentSort.ascending ? -1 : 1;
                if (aVal > bVal) return currentSort.ascending ? 1 : -1;
                return 0;
            });

            // Update sort indicators in header
            document.querySelectorAll('th.sortable').forEach(th => {
                th.classList.remove('sort-asc', 'sort-desc');
            });

            const header = document.querySelector(`th[data-column="${column}"]`);
            header.classList.add(currentSort.ascending ? 'sort-asc' : 'sort-desc');

            // Re-apply current filters
            renderTable(sorted);
            filterTable();
        }

        // Load data when page loads
        window.addEventListener('DOMContentLoaded', loadCSVData);
    </script>
</body>
</html>
